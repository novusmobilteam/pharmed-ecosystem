name: pharmed_manager
description: "A new Flutter project."

publish_to: 'none' 

version: 0.1.1

environment:
  sdk: ^3.10.7

dependencies:

  pharmed_core:
    path: ../../packages/pharmed_core
  pharmed_data:
    path: ../../packages/pharmed_data
  pharmed_ui:
    path: ../../packages/pharmed_ui
  pharmed_utils:
    path: ../../packages/pharmed_utils

  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  data_table_2: ^2.7.2
  device_info_plus: ^12.3.0
  dio: ^5.9.0
  equatable: ^2.0.8
  excel: ^4.0.6
  file_picker: ^10.3.8
  flutter:
    sdk: flutter
  flutter_libserialport: ^0.6.0
  flutter_localizations:
    sdk: flutter
  flutter_spinkit: ^5.2.2
  fluttertoast: ^9.0.0
  freezed_annotation: ^3.1.0
  go_router: ^17.0.1
  google_fonts: ^7.0.0
  intl: ^0.20.2
  logging: ^1.3.0
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.2
  provider: ^6.1.5+1
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  uuid: ^4.5.2
  window_manager: ^0.5.1
  phosphor_flutter: ^2.1.0
  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.4
  build_runner: ^2.10.4
  json_serializable: ^6.11.3
  faker: ^2.2.0



# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
        - asset: assets/fonts/Sora-ExtraBold.ttf
          weight: 800

    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Light.ttf
          weight: 300
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600

    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
  

  assets:
    - assets/
    - assets/mocks/


resolution: workspace
