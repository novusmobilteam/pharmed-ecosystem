name: pharmed_client
description: >
  PharMed — Hastane ilaç kabin yönetim sistemi.
  Kabin stok takibi, ilaç dolum/sayım/boşaltma işlemleri,
  SKT yönetimi ve yaklaşan tedavi planlamasını kapsar.
  IEC 62304 Class B uyumlu Flutter uygulaması.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  dio: ^5.4.0

  # Result type
  result_dart: ^2.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # Equatable — domain model karşılaştırması
  equatable: ^2.0.5

  # Localizations
  intl: ^0.19.0
  flutter_localizations:
    sdk: flutter

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
        - asset: assets/fonts/Sora-ExtraBold.ttf
          weight: 800

    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Light.ttf
          weight: 300
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600

    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500